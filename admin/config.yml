backend:
  name: git-gateway
  branch: test

media_folder: "img/uploads"
public_folder: "/img/uploads"

collections:
  - name: "about"
    label: "O mnie"
    files: 
      - name: "about"
        label: "O mnie"
        file: "about/about.json"
        fields:
          - { label: "Opis", name: "content", widget: "string"}
      - name: "profile_image"
        label: "Zdjęcie profilowe"
        file: "img/profilowe.jpeg"
        fields:
          - { label: "Zdjęcie profilowe", name: "image", widget: "image"}